<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工紀錄匯出 - 績效評核系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../stylesheets/performance.css">
	<link rel="icon" type="image/png" href="../images/kpi_logo_gold_rmbg_resized.png">
    <style>
        .search-advanced { display: none; margin-top: 0.5rem; }
        #employeeTableWrapper { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="performance.html">
                <img src="../images/kpi_logo_gold_rmbg_resized.png" alt="Logo" height="70" class="me-2">
                <span>績效評核系統</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="employeeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            員工評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="employeeDropdown">
                            <li><a class="dropdown-item" href="self-evaluation.html">填寫自我評核</a></li>
                            <li><a class="dropdown-item" href="performance-record.html">查詢考績紀錄</a></li>
                            <li><a class="dropdown-item" href="peer-evaluation.html">填寫同事評核</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="managerDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            主管評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="managerDropdown">
                            <li><a class="dropdown-item" href="manager-evaluation.html">填寫員工評核</a></li>
                            <li><a class="dropdown-item" href="employee-record.html">查詢員工紀錄</a></li>
							<li><a class="dropdown-item active" href="employee-export.html">員工紀錄匯出</a></li>
                            <li><a class="dropdown-item" href="peer-setting.html">設定員工互評</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
				    <li class="nav-item">
                        <span class="nav-link text-light me-3" id="userId"></span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" href="#" id="logoutBtn">登出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="container mt-4">
        <!-- 區塊 1：搜尋區 -->
        <div class="mb-3">
            <div class="input-group">
                <input type="text" id="quickSearch" class="form-control" placeholder="搜尋員工姓名...">
                <button class="btn btn-outline-secondary" id="toggleAdvanced"><i class="bi bi-funnel"></i></button>
            </div>
            <div class="search-advanced border p-3 rounded bg-light" id="advancedSearch">
                <div class="mb-2">
                    <label for="searchName" class="form-label">員工姓名</label>
                    <input type="text" id="searchName" class="form-control">
                </div>
                <div class="mb-2">
                    <label for="searchDept" class="form-label">部門代碼</label>
                    <input type="text" id="searchDept" class="form-control">
                </div>
                <button class="btn btn-primary" id="advancedSearchBtn">搜尋</button>
            </div>
        </div>

        <!-- 區塊 2：員工清單 -->
		<div class="mb-3 d-flex align-items-center">
            <label for="yearSelect" class="me-2">績效年度</label>
            <select id="yearSelect" class="form-select me-3" style="width: auto;"></select>

            <label for="stageSelect" class="me-2">評核階段</label>
            <select id="stageSelect" class="form-select" style="width: auto;">
                <option value="年中">年中</option>
                <option value="年底">年底</option>
            </select>
        </div>
        <div id="employeeTableWrapper" class="border rounded p-2 mb-3 bg-white">
            <table class="table table-sm" id="employeeTable">
                <thead class="table-light">
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>員工編號</th>
                        <th>員工姓名</th>
                        <th>部門代碼</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 動態填入 -->
                </tbody>
            </table>
        </div>

        <!-- 區塊 3：匯出按鈕 -->
        <button class="btn btn-success" id="exportBtn">匯出 Excel</button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">系統訊息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">確定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../javascripts/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../javascripts/employee-export.js"></script>
</body>
</html>
