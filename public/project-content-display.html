<!-- 添加新的 CSS 樣式 -->
<style>
    .table-wrapper {
        max-height: 300px;
        overflow: auto;
        position: relative;
    }

    .table {
        margin-bottom: 0;
    }

    .sticky-col {
        position: sticky;
        left: 0;
        background-color: #fff;
        z-index: 1;
    }

    thead th {
        position: sticky;
        top: 0;
        background-color: #f8f9fa;
        z-index: 2;
    }

    thead th.sticky-col {
        z-index: 3;
    }

    .table td, .table th {
        min-width: 150px;
        max-width: 300px;
    }

    .table td.sticky-col, .table th.sticky-col {
        min-width: 100px;
    }

    .diff-highlight {
        color: red;
    }
</style>
