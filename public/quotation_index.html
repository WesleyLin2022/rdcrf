<!DOCTYPE html>
<html lang="zh-TW">
<head>

<body>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">

                    <ul class="navbar-nav">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="projectDropdown" role="button" data-bs-toggle="dropdown">

                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="showPage('projectCreate')">專案建立</a></li>
                                <li><a class="dropdown-item" href="#" onclick="showPage('projectModify')">專案修改</a></li>
                            </ul>

                            <a class="nav-link dropdown-toggle" href="#" id="rfqDropdown" role="button" data-bs-toggle="dropdown">

                            </a>

                                <li><a class="dropdown-item" href="#" onclick="showPage('rfqInput')">RFQ輸入</a></li>

                            <a class="nav-link dropdown-toggle" href="#" id="awardDropdown" role="button" data-bs-toggle="dropdown">

                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" onclick="showPage('awardInput')">Award輸入</a></li>
                                <li><a class="dropdown-item" href="#" onclick="showPage('awardQuery')">Award查詢</a></li>
                            </ul>

							<span class="nav-link" id="userId"></span>
