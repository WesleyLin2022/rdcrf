<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>專案檔案上傳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="../stylesheets/project-quote.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="project-quote.html">專案報價系統</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="projectDropdown" role="button" data-bs-toggle="dropdown">
                            專案作業
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="project-create.html">專案建立</a></li>
                            <li><a class="dropdown-item" href="project-list.html">專案清單</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="contentDropdown" role="button" data-bs-toggle="dropdown">
                            專案內容作業
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="project-content-input.html">專案內容輸入</a></li>
                            <li><a class="dropdown-item active" href="project-file-upload.html">專案檔案上傳</a></li>
                            <li><a class="dropdown-item" href="project-content-display.html">專案內容顯示</a></li>
							<li><a class="dropdown-item" href="project-nrecost-display.html">專案NRE顯示</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
				    <li class="nav-item">
						<span class="nav-link" id="userId"></span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">登出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h2>專案檔案上傳</h2>
            </div>
            <div class="card-body">
                <form id="fileUploadForm">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="projectId" class="form-label">專案名稱</label>
                            <select class="form-control" id="projectId" required>
                                <option value="">請選擇專案名稱</option>
                            </select>
                        </div>
						<div class="col-md-4">
                            <label for="fileType" class="form-label">文件類型</label>
                            <select class="form-control" id="fileType" required>
                                <option value="">請選擇文件類型</option>
                                <option value="RFQ">RFQ</option>
                                <option value="Award">Award</option>
								<option value="NRE">NRE</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="msgFile" class="form-label">MSG 檔案</label>
                            <input type="file" class="form-control" id="msgFile" accept=".msg" required>
                        </div>
                    </div>
                    <div class="progress mb-3 d-none" id="uploadProgress">
                        <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">確認上傳</button>
                </form>

                <div id="fileList" class="mt-4 d-none">
                    <h3>已上傳檔案</h3>
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>檔案名稱</th>
								<th>原始檔名</th>
								<th>文件類型</th>
                                <th>上傳時間</th>
                                <!--<th>檔案大小</th> -->
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="fileListContent">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示訊息 Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">系統訊息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">確定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../javascripts/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="../javascripts/project-file-upload.js"></script>
</body>
</html>
