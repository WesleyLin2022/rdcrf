<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫自我評核 - 績效評核系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="../stylesheets/performance.css">
    <link rel="icon" type="image/png" href="../images/kpi_logo_gold_rmbg_resized.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="performance.html">
                <img src="../images/kpi_logo_gold_rmbg_resized.png" alt="Logo" height="70" class="me-2">
                <span>績效評核系統</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="employeeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            員工評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="employeeDropdown">
                            <li><a class="dropdown-item active" href="self-evaluation.html">填寫自我評核</a></li>
                            <li><a class="dropdown-item" href="performance-record.html">查詢考績紀錄</a></li>
                            <li><a class="dropdown-item" href="peer-evaluation.html">填寫同事評核</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="managerDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            主管評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="managerDropdown">
                            <li><a class="dropdown-item" href="manager-evaluation.html">填寫員工評核</a></li>
                            <li><a class="dropdown-item" href="employee-record.html">查詢員工紀錄</a></li>
							<li><a class="dropdown-item" href="employee-export.html">員工紀錄匯出</a></li>
                            <li><a class="dropdown-item" href="peer-setting.html">設定員工互評</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
				    <li class="nav-item">
                        <span class="nav-link text-light me-3" id="userId"></span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" href="#" id="logoutBtn">登出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">新增評核項目</h5>
            </div>
            <div class="card-body">
                <form id="evaluationForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="evaluationType" class="form-label">評核類型</label>
                            <select class="form-control" id="evaluationType" >
                                <option value="">請選擇評核類型</option>
                                <option value="日常工作項目">日常工作項目</option>
                                <option value="AI的工作項目">AI的工作項目</option>
                                <option value="加分工作項目">加分工作項目</option>
                            </select>
                        </div>
                        <!-- <div class="col-md-6 mb-3">
                            <label for="score" class="form-label">評分</label>
                            <input type="number" class="form-control" id="score" min="1" max="5" >
                        </div> -->
						<div class="col-md-4 mb-3 align-self-end">
                            <!-- 新增的 Excel 匯入按鈕 -->
							<label for="excelImport" class="form-label">從Excel匯入</label>
                            <input type="file" class="form-control" id="excelFile" accept=".xlsx, .xls">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="itemPoint" class="form-label">項目要點</label>
                        <input type="text" class="form-control" id="itemPoint" >
						<label id="KPISN" style="display: none;"></label>
                    </div>
                    <div class="mb-3">
                        <label for="description1" class="form-label">具體貢獻描述1</label>
                        <input type="text" class="form-control" id="description1" >
                    </div>
                    <div class="mb-3">
                        <label for="description2" class="form-label">具體貢獻描述2</label>
                        <input type="text" class="form-control" id="description2" >
                    </div>
                    <div class="mb-3">
                        <label for="description3" class="form-label">具體貢獻描述3</label>
                        <input type="text" class="form-control" id="description3" >
                    </div>
					
                    <button type="submit" class="btn btn-primary">確認新增</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">評核項目列表</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 10%">評核類型</th>
                                <th style="width: 15%">項目要點</th>
                                <th style="width: 20%">具體貢獻描述 1</th>
                                <th style="width: 20%">具體貢獻描述 2</th>
                                <th style="width: 20%">具體貢獻描述 3</th>
                                <th style="width: 100px text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="evaluationList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <!-- 提示訊息 Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">系統訊息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">確定</button>
                </div>
            </div>
        </div>
    </div>
	<!-- Yes/No Modal -->
	<div class="modal" id="confirmModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">確認動作</h5>
				</div>
				<div class="modal-body">
					<p>是否要覆蓋舊資料？</p>
				</div>
				<div class="modal-footer">
					<button type="button" id="btnYes" class="btn btn-primary">Yes</button>
					<button type="button" id="btnNo" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
				</div>
			</div>
		</div>
	</div>
    <script src="../javascripts/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../javascripts/self-evaluation.js"></script>
</body>
</html>
