<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫員工評核 - 績效評核系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="../stylesheets/performance.css">
	<link rel="icon" type="image/png" href="../images/kpi_logo_gold_rmbg_resized.png">
    <style>
        .score-input {
            width: 80px;
        }
        
		/* 🔹（可選）設定每欄的寬度比例 */
		#evaluationContent th:nth-child(1),
		#evaluationContent td:nth-child(1) { width: 8%; } /* 評核類型 */
		#evaluationContent th:nth-child(2),
		#evaluationContent td:nth-child(2) { width: 12%; } /* 項目要點 */
		#evaluationContent th:nth-child(3),
		#evaluationContent td:nth-child(3){ width: 20%; }
		#evaluationContent th:nth-child(4),
		#evaluationContent td:nth-child(4){ width: 20%; }
		#evaluationContent th:nth-child(5),
		#evaluationContent td:nth-child(5) { width: 20%; } /* 三個貢獻描述 */
		#evaluationContent th:nth-child(6),
		#evaluationContent td:nth-child(6) { width: 6%; } /* 貢獻評核 */
		#evaluationContent th:nth-child(7),
		#evaluationContent td:nth-child(7) { width: 6%; } /* 操作 */
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="performance.html">
                <img src="../images/kpi_logo_gold_rmbg_resized.png" alt="Logo" height="70" class="me-2">
                <span>績效評核系統</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="employeeDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            員工評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="employeeDropdown">
                            <li><a class="dropdown-item" href="self-evaluation.html">填寫自我評核</a></li>
                            <li><a class="dropdown-item" href="performance-record.html">查詢考績紀錄</a></li>
                            <li><a class="dropdown-item" href="peer-evaluation.html">填寫同事評核</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="managerDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            主管評核作業
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="managerDropdown">
                            <li><a class="dropdown-item active" href="manager-evaluation.html">填寫員工評核</a></li>
                            <li><a class="dropdown-item" href="employee-record.html">查詢員工紀錄</a></li>
							<li><a class="dropdown-item" href="employee-export.html">員工紀錄匯出</a></li>
                            <li><a class="dropdown-item" href="peer-setting.html">設定員工互評</a></li>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
				    <li class="nav-item">
                        <span class="nav-link text-light me-3" id="userId"></span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" href="#" id="logoutBtn">登出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">員工評核查詢</h5>
            </div>
            <div class="card-body">
                <form id="searchForm" class="mb-4">
                    <div class="row align-items-end">
                        <div class="col-md-4">
                            <label for="departmentCode" class="form-label">部門代碼</label>
                            <select class="form-control" id="departmentCode" required>
                                <option value="-1">請選擇部門代碼</option>
                                <option value="0">0R760</option>
                                <option value="1">0R761</option>
                                <option value="2">0R762</option>
                                <option value="3">0R763</option>
                                <option value="4">0R764</option>
								<option value="5">0R765</option>
								<option value="6">0R766</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="employeeId" class="form-label">員工姓名</label>
                            <select class="form-control" id="employeeId" required>
                                <option value="">請選擇員工</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100">查詢</button>
                        </div>
                    </div>
                </form>

                <div id="evaluationContent" class="d-none">
                    <h6 class="mb-3">評核內容</h6>
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
							    <tr>
								    <th>評核類型</th>
									<th>項目要點</th>
									<th>具體貢獻描述1</th>
									<th>具體貢獻描述2</th>
									<th>具體貢獻描述3</th>
									<th>貢獻評核</th>
									<th>操作</th>
								</tr>
								
                            </thead>
                            <tbody id="evaluationList">
                            </tbody>
                        </table>
                    </div>
					
                </div>
            </div>
        </div>
    </div>
	<!-- 提示訊息 Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">系統訊息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">確定</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../javascripts/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="../javascripts/manager-evaluation.js"></script>
</body>
</html>
